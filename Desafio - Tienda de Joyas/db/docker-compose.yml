services:
  postgres:
    image: postgres:16
    container_name: joyas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: joyas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: